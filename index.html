<script>
  // Silence ResizeObserver loop notifications — benign browser warning
  (function() {
    const _RO = window.ResizeObserver;
    if (_RO) {
      window.ResizeObserver = function(cb) {
        let pending = null;
        return new _RO((entries, observer) => {
          if (pending) return;
          pending = requestAnimationFrame(() => {
            pending = null;
            try { cb(entries, observer); } catch (e) {}
          });
        });
      };
      window.ResizeObserver.prototype = _RO.prototype;
    }
    window.addEventListener('error', e => {
      if (e && e.message && /ResizeObserver loop/.test(e.message)) {
        e.stopImmediatePropagation();
        e.preventDefault();
        return false;
      }
    }, true);
  })();
</script>

<style>
/* ========================================================
   Wedding invitation — Владислав & Александра · 21.07.2026
   Palette: sage & forest green · ivory white · silver · lace
   ======================================================== */

:root {
  /* Surfaces — airy white-green, wedding-light */
  --bg: #f7f9f2;
  --bg-warm: #eef4e4;
  --bg-card: #fdfdf9;
  --ivory: #fbfcf6;

  /* Greens — fresh, spring, luxe */
  --sage-pale: #dfead0;
  --sage-soft: #aece85;
  --sage: #6ba23e;
  --sage-deep: #427d2c;
  --green-deep: #2c5d20;
  --forest: #1f4417;
  --lime: #9fc94d;
  --lime-soft: #c4e08a;
  --ink: #20381a;
  --ink-soft: #3f5a30;

  /* Silver */
  --silver-hi: #f4f5f7;
  --silver: #cccfd5;
  --silver-mid: #aab0b8;
  --silver-deep: #868b94;
  --silver-shadow: #62666e;

  /* Lines */
  --line: rgba(66, 125, 44, 0.16);
  --line-soft: rgba(66, 125, 44, 0.09);
  --shadow-soft: 0 12px 40px -18px rgba(31, 68, 23, 0.26);
  --shadow: 0 30px 70px -36px rgba(31, 68, 23, 0.38);

  /* Type — kept to three families for consistency */
  --font-display: "Cormorant Garamond", "Times New Roman", serif;
  --font-title: "Cormorant Garamond", "Times New Roman", serif;
  --font-script: "Pinyon Script", "Brush Script MT", cursive;
  --font-sans: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --max: 1120px;
  --pad-x: clamp(22px, 5vw, 80px);
}

/* ---- Playful: more lime/salad green ---- */
[data-variant="playful"] {
  --bg: #f0f6e6;
  --bg-warm: #e8f1d6;
  --sage: #6fa83a;
  --sage-deep: #468128;
  --forest: #244f18;
  --lime: #aad452;
}

/* ---- Minimalist: cleaner, more silver/white ---- */
[data-variant="minimal"] {
  --bg: #f9faf5;
  --bg-warm: #f2f5ec;
  --sage: #7ba34f;
  --sage-deep: #4f7a38;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.55;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body.locked { overflow: hidden; }
img { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ---- Type utilities ---- */
.serif   { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }
.title   { font-family: var(--font-title); font-weight: 600; letter-spacing: 0.04em; }
.script  { font-family: var(--font-script); font-weight: 400; }
.finale  { font-family: "Marcellus", "Cormorant Garamond", serif; font-weight: 400; letter-spacing: 0.04em; }
/* Unified couple-names face — used for every "Владислав и Александра" */
.names   { font-family: "Marcellus", "Cormorant Garamond", serif; font-weight: 400; letter-spacing: 0.04em; }
.caps    { font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.34em; font-size: 12px; font-weight: 500; }
.caps-sm { font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.42em; font-size: 10px; font-weight: 500; }

/* Deep-green "engraved" display text (was silver — silver is invisible on light bg) */
.silver-text {
  color: var(--green-deep);
  background: none;
  -webkit-text-fill-color: currentColor;
}

/* ---- Section scaffolding ---- */
.section {
  position: relative;
  padding: clamp(72px, 11vh, 130px) var(--pad-x);
  max-width: var(--max);
  margin: 0 auto;
}
.section--full { max-width: none; padding-left: 0; padding-right: 0; }

.eyebrow {
  display: inline-flex; align-items: center; gap: 14px;
  color: var(--sage-deep);
}
.eyebrow::before { content: ""; height: 1px; width: 30px; background: currentColor; opacity: 0.5; }
.eyebrow.center { justify-content: center; }
.eyebrow.center::after { content: ""; height: 1px; width: 30px; background: currentColor; opacity: 0.5; }

/* ---- Lace: scalloped border strip ---- */
.lace-edge {
  height: 26px;
  width: 100%;
  background-image:
    radial-gradient(circle at 13px 0, transparent 11px, var(--lace-color, var(--ivory)) 11.5px),
    radial-gradient(circle at 0 0, var(--lace-color, var(--ivory)) 4px, transparent 4.5px);
  background-size: 26px 26px, 13px 13px;
  background-repeat: repeat-x;
  background-position: center top;
  pointer-events: none;
}

/* Lace doily ring used as a frame accent */
.lace-ring {
  border: 1px solid var(--line);
  border-radius: 50%;
  position: relative;
}
.lace-ring::before {
  content: "";
  position: absolute; inset: 6px;
  border: 1px dashed var(--silver-mid);
  border-radius: 50%;
  opacity: 0.55;
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 14px 28px;
  border: 1px solid var(--sage-deep);
  background: transparent;
  color: var(--sage-deep);
  font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.btn:hover { background: var(--sage-deep); color: var(--ivory); }

/* ---- Animations ---- */
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
@keyframes glowPulse {
  0%, 100% { opacity: 0.45; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.06); }
}
@keyframes beat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.15); }
  30% { transform: scale(1); }
}
@keyframes drift {
  0%   { transform: translate(0,0) rotate(0); opacity: 0; }
  10%  { opacity: 0.5; }
  90%  { opacity: 0.5; }
  100% { transform: translate(40px, -110vh) rotate(360deg); opacity: 0; }
}
@keyframes shimmerMove {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* ---- Ambient (silver flecks + lace petals) ---- */
.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.ambient .fleck {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff, #d9dbe0 55%, #a9adb5 100%);
  opacity: 0.5;
}
.ambient .petal {
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 0 70% 0 70%;
  background: var(--sage-soft);
  opacity: 0.25;
}

/* ---- Responsive ---- */
@media (max-width: 760px) {
  .section { padding-top: clamp(56px, 9vh, 96px); padding-bottom: clamp(56px, 9vh, 96px); }
  .hide-narrow { display: none !important; }
}

@media (max-width: 760px) {
  .kids-grid, .greet-grid { grid-template-columns: 1fr !important; }
  .greet-grid { gap: 40px !important; }
}
</style>

// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {

    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}

function TweakToggle({ label, value, onChange }) {

              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const { useEffect, useRef, useState } = React;

/* -------------------- Scroll reveal -------------------- */
function Reveal({ children, delay = 0, as: Tag = "div", className = "", style = {} }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(
      (entries) => entries.forEach(e => { if (e.isIntersecting) setShown(true); }),
      { threshold: 0.12 }
    );
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return (
    <Tag ref={ref} className={className} style={{
      ...style,
      opacity: shown ? 1 : 0,
      transform: shown ? "translateY(0)" : "translateY(22px)",
      transition: `opacity 1s ease ${delay}ms, transform 1s ease ${delay}ms`,
    }}>{children}</Tag>
  );
}

/* -------------------- Lace doily corner -------------------- */
function LaceDoily({ size = 90, className = "", style = {} }) {
  const teeth = 24;
  const pts = [];
  for (let i = 0; i < teeth; i++) {
    const a = (i / teeth) * Math.PI * 2;
    pts.push([50 + Math.cos(a) * 46, 50 + Math.sin(a) * 46]);
  }
  return (
    <svg viewBox="0 0 100 100" width={size} height={size} className={className} style={style} aria-hidden>
      <g fill="none" stroke="var(--silver-mid)" strokeWidth="0.6" opacity="0.7">
        <circle cx="50" cy="50" r="46" strokeDasharray="2 3" />
        <circle cx="50" cy="50" r="38" />
        <circle cx="50" cy="50" r="30" strokeDasharray="1 4" />
        {pts.map(([x, y], i) => <circle key={i} cx={x} cy={y} r="1.6" fill="var(--silver-mid)" stroke="none" />)}
        {Array.from({ length: 12 }).map((_, i) => {
          const a = (i / 12) * Math.PI * 2;
          return <line key={i} x1="50" y1="50"
            x2={50 + Math.cos(a) * 38} y2={50 + Math.sin(a) * 38} strokeWidth="0.4" />;
        })}
      </g>
    </svg>
  );
}

function Envelope({ onOpen }) {
  const [stage, setStage] = useStateE("idle"); // idle → cracking → opening → done
  const [letterOut, setLetterOut] = useStateE(false);

  useEffectE(() => {
    document.body.classList.add("locked");
    return () => document.body.classList.remove("locked");
  }, []);

  const handleClick = () => {
    if (stage !== "idle") return;
    setStage("cracking");
    setTimeout(() => setStage("opening"), 700);
    setTimeout(() => setLetterOut(true), 1500);

/* ============================================================
   COUNTDOWN
   ============================================================ */
function Countdown() {
  const target = new Date("2026-07-21T14:30:00+02:00");
  const [now, setNow] = useStateS(new Date());
  useEffectS(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const diff = Math.max(0, target - now);
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff / 3600000) % 24);
  const mins = Math.floor((diff / 60000) % 60);
  const secs = Math.floor((diff / 1000) % 60);
  const units = [{ v: days, l: "дней" }, { v: hours, l: "часов" }, { v: mins, l: "минут" }, { v: secs, l: "секунд" }];

  return (
    <section className="section" data-screen-label="04 Countdown" style={{ textAlign: "center", position: "relative", overflow: "hidden" }}>
      <div aria-hidden style={{ position: "absolute", left: "4%", bottom: "14%", opacity: 0.55 }} className="hide-narrow"><Candle height={130} /></div>

      <Reveal delay={260}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "clamp(8px, 3vw, 36px)", maxWidth: 680, margin: "50px auto 0" }}>
          {units.map(u => (
            <div key={u.l} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
              <div className="serif silver-text" style={{
                fontSize: "clamp(38px, 7vw, 84px)", fontStyle: "italic", lineHeight: 1, fontVariantNumeric: "tabular-nums",
              }}>{String(u.v).padStart(2, "0")}</div>
              <div className="caps-sm" style={{ color: "var(--ink-soft)" }}>{u.l}</div>
            </div>
          ))}
        </div>
      </Reveal>
    </section>
  );
}

/* global React, ReactDOM,
   Envelope, AmbientLayer, LaceValance,
   Childhood, CalendarSection, Countdown, Greeting, DialogueInterstitial,
   Venue, DressCode, BuenoSection,
   useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakSelect */

const { useState: useStateA, useEffect: useEffectA } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "classic",
  "showAmbient": true,
  "swayOnScroll": true,
  "skipEnvelope": false
}/*EDITMODE-END*/;

function App() {
  const [opened, setOpened] = useStateA(false);
  const [t, setTweak] = useTweaks(DEFAULTS);

  useEffectA(() => {
    document.documentElement.setAttribute("data-variant", t.variant);
  }, [t.variant]);

  // Gentle sway on .sway-slow / .sway-slow-rev ornaments
  useEffectA(() => {
    if (!t.swayOnScroll) return;
    let raf;
    const update = () => {
      const sc = window.scrollY;
      document.querySelectorAll(".sway-slow").forEach(el => {
        el.style.transform = `rotate(${Math.sin(sc / 220) * 4}deg) translateY(${Math.sin(sc / 260) * 5}px)`;
      });
      document.querySelectorAll(".sway-slow-rev").forEach(el => {
        el.style.transform = `rotate(${-Math.sin(sc / 220) * 4}deg) translateY(${-Math.sin(sc / 260) * 5}px)`;
      });
      raf = null;
    };
    const onScroll = () => { if (!raf) raf = requestAnimationFrame(update); };
    window.addEventListener("scroll", onScroll, { passive: true });
    update();
    return () => window.removeEventListener("scroll", onScroll);
  }, [t.swayOnScroll, opened]);

  useEffectA(() => { if (t.skipEnvelope) setOpened(true); }, [t.skipEnvelope]);

  return (
    <>
      {t.showAmbient && opened && <AmbientLayer count={14} />}

      <main style={{ position: "relative", zIndex: 2 }}>
        <LaceValance />
        <Childhood />
        <CalendarSection />
        <Countdown />
        <Greeting />
        <DialogueInterstitial />
        <Venue />
        <DressCode />
        <BuenoSection />
      </main>

      {!opened && <Envelope onOpen={() => setOpened(true)} />}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Визуальный стиль">
          <TweakSelect
            label="Вариант оформления"
            value={t.variant}
            options={[
              { value: "classic", label: "Классика — шалфей и серебро" },
              { value: "playful", label: "Игривый — больше зелени" },
              { value: "minimal", label: "Минимализм — чистый sans" },
            ]}
            onChange={(v) => setTweak("variant", v)}
          />
        </TweakSection>

        <TweakSection label="Интерактив">
          <TweakToggle label="Серебро и кружево в фоне" value={t.showAmbient} onChange={(v) => setTweak("showAmbient", v)} />
          <TweakToggle label="Покачивание при скролле" value={t.swayOnScroll} onChange={(v) => setTweak("swayOnScroll", v)} />
        </TweakSection>

        <TweakSection label="Демо">
          <TweakToggle
            label="Пропустить конверт"
            value={t.skipEnvelope}
            onChange={(v) => { setTweak("skipEnvelope", v); if (v) setOpened(true); }}
          />
          <button type="button"
            onClick={() => { setOpened(false); window.scrollTo(0, 0); }}
            style={{
              marginTop: 10, padding: "8px 14px", fontSize: 11, letterSpacing: "0.2em",
              textTransform: "uppercase", border: "1px solid rgba(255,255,255,0.3)",
              background: "transparent", color: "inherit", cursor: "pointer",
            }}>
            Показать конверт снова
          </button>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    const splash = document.getElementById("boot-splash");
    if (splash) { splash.style.opacity = "0"; setTimeout(() => splash.remove(), 700); }
  });
});

console.log('[loaded] app.jsx');

  window.__errors.push({msg: 'combined caught: ' + (e.message || e), stack: (e.stack || '').slice(0, 1000)});
  console.error('[combined caught]', e);
}
</script>
</body>
